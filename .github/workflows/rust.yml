name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      working-directory: Faucet_Cli
      run: cargo build --release

    - name : upload
      uses: actions/upload-artifact@v4
      with :
        name: faucet_v1
        path: Faucet_Cli/target/release/faucet-cli*
    
